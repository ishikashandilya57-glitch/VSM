<!DOCTYPE html>
<html>
<head>
    <title>Test Apps Script Connection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-box {
            border: 2px solid #ccc;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .success { background-color: #d4edda; border-color: #28a745; }
        .error { background-color: #f8d7da; border-color: #dc3545; }
        .info { background-color: #d1ecf1; border-color: #17a2b8; }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        pre {
            background-color: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🧪 Test Apps Script Connection</h1>
    
    <div class="test-box info">
        <h2>Apps Script URL:</h2>
        <pre id="url">https://script.google.com/macros/s/AKfycbwAfVUwR5IXcpfG9Wa6wRAaKsG2_Xeu_-UXyuk_1kt3t9jxpZeq9V8OPBzSqZeoUIaW/exec</pre>
    </div>

    <button onclick="testConnection()">🚀 Test Connection</button>
    
    <div id="result"></div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwAfVUwR5IXcpfG9Wa6wRAaKsG2_Xeu_-UXyuk_1kt3t9jxpZeq9V8OPBzSqZeoUIaW/exec';

        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="test-box info"><h2>⏳ Testing...</h2></div>';

            try {
                // Test 1: GET request (should return error about missing parameters)
                console.log('Test 1: GET request to Apps Script...');
                const getResponse = await fetch(APPS_SCRIPT_URL);
                const getText = await getResponse.text();
                
                console.log('GET Response:', getText);
                
                let getResult = '';
                try {
                    const getJson = JSON.parse(getText);
                    getResult = `
                        <div class="test-box ${getJson.success ? 'error' : 'success'}">
                            <h2>✅ Test 1: GET Request - PASSED</h2>
                            <p>Apps Script is accessible and returning JSON.</p>
                            <pre>${JSON.stringify(getJson, null, 2)}</pre>
                        </div>
                    `;
                } catch (e) {
                    getResult = `
                        <div class="test-box error">
                            <h2>❌ Test 1: GET Request - FAILED</h2>
                            <p>Apps Script returned HTML instead of JSON. This means it's not deployed as a Web App.</p>
                            <details>
                                <summary>Click to see response</summary>
                                <pre>${getText.substring(0, 500)}...</pre>
                            </details>
                            <h3>How to fix:</h3>
                            <ol>
                                <li>Open Google Apps Script editor</li>
                                <li>Click Deploy → Manage deployments</li>
                                <li>Make sure it's deployed as "Web app"</li>
                                <li>"Who has access" must be "Anyone"</li>
                            </ol>
                        </div>
                    `;
                }

                // Test 2: POST request (should save data)
                console.log('Test 2: POST request to Apps Script...');
                const postResponse = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        lineNo: 'TEST_LINE',
                        ocNo: 'LC/DMN/25/12270',
                        orderNo: 'TEST_ORDER',
                        processStage: 'Sewing',
                        actualStartDate: '2026-01-20',
                        actualEndDate: '2026-01-25',
                        delayReason: ''
                    })
                });

                const postText = await postResponse.text();
                console.log('POST Response:', postText);

                let postResult = '';
                try {
                    const postJson = JSON.parse(postText);
                    if (postJson.success) {
                        postResult = `
                            <div class="test-box success">
                                <h2>✅ Test 2: POST Request - PASSED</h2>
                                <p>Data was successfully saved to VSM_execution sheet!</p>
                                <pre>${JSON.stringify(postJson, null, 2)}</pre>
                                <p><strong>Check your VSM_execution sheet for a new row with TEST_LINE.</strong></p>
                            </div>
                        `;
                    } else {
                        postResult = `
                            <div class="test-box error">
                                <h2>⚠️ Test 2: POST Request - FAILED</h2>
                                <p>Apps Script returned an error:</p>
                                <pre>${JSON.stringify(postJson, null, 2)}</pre>
                                <h3>Common errors:</h3>
                                <ul>
                                    <li><strong>"Order not found"</strong> → OC NO doesn't exist in Order_Master</li>
                                    <li><strong>"Sheet not found"</strong> → VSM_execution sheet missing</li>
                                    <li><strong>"Permission denied"</strong> → Apps Script can't access the sheet</li>
                                </ul>
                            </div>
                        `;
                    }
                } catch (e) {
                    postResult = `
                        <div class="test-box error">
                            <h2>❌ Test 2: POST Request - FAILED</h2>
                            <p>Apps Script returned HTML instead of JSON.</p>
                            <pre>${postText.substring(0, 500)}...</pre>
                        </div>
                    `;
                }

                resultDiv.innerHTML = getResult + postResult;

            } catch (error) {
                console.error('Connection error:', error);
                resultDiv.innerHTML = `
                    <div class="test-box error">
                        <h2>❌ Connection Failed</h2>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <h3>Possible causes:</h3>
                        <ul>
                            <li><strong>Wrong URL</strong> → Check the URL in .env.local</li>
                            <li><strong>Apps Script not deployed</strong> → Deploy it as Web App</li>
                            <li><strong>Network issue</strong> → Check your internet connection</li>
                            <li><strong>CORS error</strong> → Apps Script must be deployed with "Anyone" access</li>
                        </ul>
                        <h3>Next steps:</h3>
                        <ol>
                            <li>Open: <a href="https://script.google.com/home" target="_blank">Google Apps Script</a></li>
                            <li>Find your VSM project</li>
                            <li>Click Deploy → Manage deployments</li>
                            <li>Make sure "Who has access" = "Anyone"</li>
                            <li>Copy the Web App URL</li>
                            <li>Update .env.local with the correct URL</li>
                        </ol>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
